name: Scrapping news

on:
  schedule:
    - cron: "0 0 * * 1"

jobs:
  scraping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Installing UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Installing dependencies
        run: uv sync --locked --all-extras --dev
      - name: Run scraper
        run: uv run main.py

      - name: Update dataset
        run: |
          git config user.name jbuendia1y
          git config user.email jbuendia1y@gmail.com
          git add datasets/news.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "[bot] Update dataset with latest news"
          git push origin main
